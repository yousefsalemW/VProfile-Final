apiVersion: apps/v1
kind: Deployment
metadata: { name: mc01, namespace: {{ .Values.namespace }} }
spec:
  replicas: 1
  selector: { matchLabels: { app: mc01 } }
  template:
    metadata: { labels: { app: mc01, tier: data } }
    spec:
      containers:
        - name: mc01
          image: "{{ .Values.ecr }}/{{ .Values.mc.image.repo }}:{{ .Values.mc.image.tag }}"
          ports: [{ containerPort: 11211 }]
---
apiVersion: v1
kind: Service
metadata: { name: mc01, namespace: {{ .Values.namespace }} }
spec:
  selector: { app: mc01 }
  ports: [{ port: 11211, targetPort: 11211 }]
